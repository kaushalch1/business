<html>
    <head>
        <title>
            Business board game
        </title>
        <style>
            .game-board{
                display: grid;
                grid-template-columns: repeat(10,1fr);
                grid-template-rows: repeat(10,1fr);
                width: 90vmin;
                height: 85vmin;
                background: #ECF0F1;
                border: 5px solid #333333;
                position: relative;
            }
            body{
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                margin: 0;
                background: #2C3E50;
                font-family: sans-serif;
                -webkit-text-stroke: 0.02px black;
            }
            .color-bar{
                height: 20%;
                width: 100%;
                position: absolute;
                border-bottom: 1px solid #333333;
            }
            .cell{
                border: 1px solid gray;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: flex-end;
                font-size: 0.75rem;
                font-weight: bold;
                position:relative;
                text-align: center;
                background: white;
                padding: 2px;
                box-sizing: border-box;
            }
            .corner{
                background: #DCDDE1;
                justify-content: center;
                font-size: 0.9rem;
            }
            #title{
                position: absolute;
                inset: 0;
                margin: 0;
                display: grid;
                place-items: center;
                text-align: center;
            }
            .c1{
                background-color: #FBBF24;
                color: white;
            }
            .c2{
                background-color: #dd4c4c;
                color: white;
            }
            .c3{
                background-color: rgb(114, 236, 108);
                color: white;
            }
            .c4{
                background-color: rgb(106, 106, 225);
                color: white;
            }
        </style>
    </head>
    <body>
