<html>
    <head>
        <title>
            Business board game
        </title>
        <style>
            .game-board{
                display: grid;
                grid-template-columns: repeat(11,1fr);
                grid-template-rows: repeat(11,1fr);
                width: 90vmin;
                height: 85vmin;
                background: #ECF0F1;
                border: 5px solid #333333;
                position: relative;
            }
            body{
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                margin: 0;
                background: #2C3E50;
                font-family: sans-serif;
                -webkit-text-stroke: 0.02px black;
            }
            .color-bar{
                height: 20%;
                width: 100%;
                position: absolute;
                border-bottom: 1px solid #333333;
            }
            .cell{
                border: 1px solid gray;

                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: flex-end;
                font-size: 0.6rem;
                font-weight: bold;
                position:relative;
                text-align: center;
                background: white;
                padding: 2px;
                box-sizing: border-box;
            }
            .corner{
                background: #DCDDE1;
                justify-content: center;
                font-size: 0.8rem;
            }
            #title{
                position: absolute;
                inset: 0;
                margin: 0;
                display: grid;
                place-items: center;
                text-align: center;
            }
            .c1{
                background-color: #FBBF24;
                color: white;
            }
            .c2{
                background-color: #dd4c4c;
                color: white;
            }
            .c3{
                background-color: rgb(114, 236, 108);
                color: white;
            }
            .c4{
                background-color: rgb(106, 106, 225);
                color: white;
            }
        </style>
    </head>
    <body>
        
        <div class="game-board">
            <div class="cell corner c1" style="grid-row:1;grid-column: 1;">Rest House</div>

            
            <div class="cell" style="grid-row: 2;grid-column: 11;"></div>
            <div class="cell" style="grid-row: 3;grid-column: 11;"></div>
            <div class="cell" style="grid-row: 4;grid-column: 11;"></div>
            <div class="cell" style="grid-row: 5;grid-column: 11;"></div>
            <div class="cell" style="grid-row: 6;grid-column: 11"></div>
            <div class="cell" style="grid-row: 7;grid-column: 11;"></div>
            <div class="cell" style="grid-row: 8;grid-column: 11;"></div>
            <div class="cell" style="grid-row: 9;grid-column: 11;"></div>
            <div class="cell" style="grid-row: 10;grid-column: 11;"></div>

            <h2 id="title">Business board <br>game</h2>
            <div class="cell" style="grid-row: 1;grid-column: 2;"></div>
            <div class="cell" style="grid-row: 1;grid-column: 3"></div>
            <div class="cell" style="grid-row: 1;grid-column: 4;"></div>
            <div class="cell" style="grid-row: 1;grid-column: 5;"></div>
            <div class="cell" style="grid-row: 1;grid-column: 6;"></div>
            <div class="cell" style="grid-row: 1;grid-column: 7;"></div>
            <div class="cell" style="grid-row: 1;grid-column: 8;"></div>
            <div class="cell" style="grid-row: 1;grid-column: 9;"></div>
            <div class="cell" style="grid-row: 1;grid-column: 10"></div>
            <div class="cell corner c2" style="grid-row: 1;grid-column: 11">Jail</div>

            <div class="cell corner c4" style="grid-row: 11;grid-column: 1">Club</div>
            <div class="cell" style="grid-row: 11;grid-column: 2;"></div>
            <div class="cell" style="grid-row: 11;grid-column: 3;"></div>
            <div class="cell" style="grid-row: 11;grid-column: 4;"></div>
            <div class="cell" style="grid-row: 11;grid-column: 5;"></div>
            <div class="cell" style="grid-row: 11;grid-column: 6;"></div>
            <div class="cell" style="grid-row: 11;grid-column: 7;"></div>
            <div class="cell" style="grid-row: 11;grid-column: 8;"></div>
            <div class="cell" style="grid-row: 11;grid-column: 9;"></div>
            <div class="cell" style="grid-row: 11;grid-column: 10;"></div>
            <div class="cell corner c3" style="grid-row: 11;grid-column: 11;">Go</div>

            <div class="cell" style="grid-row: 10;grid-column: 1;"></div>
            <div class="cell" style="grid-row: 9;grid-column: 1;"></div>
            <div class="cell" style="grid-row: 8;grid-column: 1;"></div>
            <div class="cell" style="grid-row: 7;grid-column: 1;"></div>
            <div class="cell" style="grid-column: 1;grid-row: 6;"></div>
            <div class="cell" style="grid-row: 5;grid-column: 1;"></div>
            <div class="cell" style="grid-row: 4;grid-column: 1;"></div>
            <div class="cell" style="grid-row: 3;grid-column: 1;"></div>
            <div class="cell" style="grid-row: 2;grid-column: 1;"></div>
        </div>
        <script>

        </script>
    </body>
</html>
